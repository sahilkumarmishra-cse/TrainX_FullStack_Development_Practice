<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrewBolt Grid Layout</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #2b180f;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 30px;
      }

      .container {
        width: 1100px;

        display: grid;

        grid-template-columns: 2fr 2fr 1.2fr;

        grid-template-rows: 280px 220px;

        gap: 20px;
      }

      /* COMMON CARD */

      .card {
        border-radius: 25px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-8px);
      }

      /* HERO SECTION */

      .hero {
        grid-column: 1 / span 2;

        background: linear-gradient(135deg, #ffca2c, #f4b400);

        padding: 35px;

        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .hero h1 {
        font-size: 72px;

        line-height: 0.95;

        color: #2d1a12;
      }

      .hero-bottom {
        display: flex;

        justify-content: space-between;

        align-items: center;
      }

      .logo {
        font-size: 30px;

        font-weight: bold;

        color: #2d1a12;
      }

      .hero-text {
        width: 280px;

        color: #3f2819;

        font-size: 16px;
      }

      /* COFFEE IMAGE */

      .coffee {
        position: relative;
      }

      .coffee img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* MODEL IMAGE */

      .model img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* MENU */

      .menu {
        background: #4d3226;

        display: flex;

        justify-content: center;

        align-items: center;
      }

      .menu h2 {
        color: #ffd54f;

        text-align: center;

        font-size: 28px;

        line-height: 1.8;
      }

      /* PROMO */

      .promo {
        background: #687d2d;

        display: flex;

        flex-direction: column;

        justify-content: center;

        align-items: center;

        text-align: center;

        padding: 20px;
      }

      .promo h2 {
        color: #ffd54f;

        font-size: 32px;

        line-height: 1.3;
      }

      .promo p {
        color: white;

        margin-top: 12px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- HERO SECTION -->

      <div class="card hero">
        <h1>
          Strike Fast,<br />
          Sip Slow
        </h1>

        <div class="hero-bottom">
          <div class="logo">⚡ brewbolt</div>

          <div class="hero-text">
            BrewBolt is a haven for those who chase the storm but relish the
            calm.
          </div>
        </div>
      </div>

      <!-- COFFEE CUP IMAGE -->

      <div class="card coffee">
        <img
          src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=800"
        />
      </div>

      <!-- BARISTA IMAGE -->

      <div class="card model">
        <img
          src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=800"
        />
      </div>

      <!-- MENU -->

      <div class="card menu">
        <h2>
          BuzzBrew<br />
          Zappuccino<br />
          ⚡ Shockolatte<br />
          FlashFrappe<br />
          FusionFlat
        </h2>
      </div>

      <!-- PROMO -->

      <div class="card promo">
        <h2>
          Taste the Spark.<br />
          Live the Charge.
        </h2>

        <p>brewbolt.co</p>
      </div>
    </div>
  </body>
</html>
