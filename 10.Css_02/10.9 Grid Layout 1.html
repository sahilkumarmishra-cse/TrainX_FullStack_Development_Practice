<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Grid Layout</title>
    <link rel="stylesheet" href="10.10 Style Layout 1.css" />
  </head>
  <body>
    <div class="grid-container">
      <div class="box green left"></div>

      <div class="box green top"></div>

      <div class="box red top-right"></div>

      <div class="box yellow middle-left"></div>

      <div class="box red middle-right"></div>

      <div class="box red bottom-left"></div>

      <div class="box yellow bottom-right"></div>

      <div class="box green right"></div>
    </div>
  </body>
</html>
