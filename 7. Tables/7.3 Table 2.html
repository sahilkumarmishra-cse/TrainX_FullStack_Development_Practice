<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Collapsible Table Border</title>
</head>

<body>

    <h1 style="text-align: center;
               font-size: 50px;
               margin-top: 20px;">
        Collapsible Table Border
    </h1>

    <table border="1"
           cellspacing="0"
           cellpadding="12"
           style="border-collapse: collapse;
                  width: 85%;
                  margin: auto;
                  border: 6px solid blue;
                  font-size: 28px;
                  text-align: left;">

        <!-- Heading Row -->
        <tr style="font-weight: bold;
                   font-size: 32px;">

            <th style="border: 3px solid blue;">
                Emp Code
            </th>

            <th style="border: 3px solid blue;">
                Emp Name
            </th>

            <th style="border: 3px solid blue;">
                Job Title
            </th>

            <th style="border: 3px solid blue;">
                Salary(LPA)
            </th>
        </tr>

        <!-- Row 1 -->
        <tr>
            <td style="border: 3px solid blue;">911</td>
            <td style="border: 3px solid blue;">Zoya Shaikh</td>
            <td style="border: 3px solid blue;">Developer</td>
            <td style="border: 3px solid blue;">3.6</td>
        </tr>

        <!-- Row 2 -->
        <tr>
            <td style="border: 3px solid blue;">912</td>
            <td style="border: 3px solid blue;">Lisa Dev</td>
            <td style="border: 3px solid blue;">Tester</td>
            <td style="border: 3px solid blue;">2.8</td>
        </tr>

        <!-- Row 3 -->
        <tr>
            <td style="border: 3px solid blue;">913</td>
            <td style="border: 3px solid blue;">Deepak Jadeja</td>
            <td style="border: 3px solid blue;">Digital Marketing</td>
            <td style="border: 3px solid blue;">5.2</td>
        </tr>

        <!-- Row 4 -->
        <tr>
            <td style="border: 3px solid blue;">914</td>
            <td style="border: 3px solid blue;">Aditi Yewale</td>
            <td style="border: 3px solid blue;">Developer</td>
            <td style="border: 3px solid blue;">4</td>
        </tr>

        <!-- Row 5 -->
        <tr>
            <td style="border: 3px solid blue;">915</td>
            <td style="border: 3px solid blue;">Simren Rao</td>
            <td style="border: 3px solid blue;">HR</td>
            <td style="border: 3px solid blue;">5.6</td>
        </tr>

    </table>

</body>

</html>
