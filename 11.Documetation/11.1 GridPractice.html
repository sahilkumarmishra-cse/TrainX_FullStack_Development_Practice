<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout Design</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #f4f4f4;
        font-family: Arial, sans-serif;
      }

      .container {
        width: 900px;
        height: 700px;
        border: 3px solid black;
        padding: 15px;

        display: grid;
        gap: 15px;

        grid-template-columns: 2fr 1fr 1fr 1fr;
        grid-template-rows: 180px 180px 150px 120px;

        grid-template-areas:
          "one two three four"
          "one five six four"
          "seven seven seven seven"
          "eight nine nine ten";
      }

      .box {
        border: 2px solid black;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 30px;
        font-weight: bold;
        background: white;
      }

      .box1 {
        grid-area: one;
      }
      .box2 {
        grid-area: two;
      }
      .box3 {
        grid-area: three;
      }
      .box4 {
        grid-area: four;
      }
      .box5 {
        grid-area: five;
      }
      .box6 {
        grid-area: six;
      }
      .box7 {
        grid-area: seven;
      }
      .box8 {
        grid-area: eight;
      }
      .box9 {
        grid-area: nine;
      }
      .box10 {
        grid-area: ten;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="box box1">1</div>
      <div class="box box2">2</div>
      <div class="box box3">3</div>
      <div class="box box4">4</div>
      <div class="box box5">5</div>
      <div class="box box6">6</div>
      <div class="box box7">7</div>
      <div class="box box8">8</div>
      <div class="box box9">9</div>
      <div class="box box10">10</div>
    </div>
  </body>
</html>
