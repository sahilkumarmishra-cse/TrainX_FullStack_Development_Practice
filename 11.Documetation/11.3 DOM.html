<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2x2 Reviews Grid</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <style>
    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .review-card {
      border: 1px solid #ccc;
      padding: 20px;
      border-radius: 5px;
    }

    .review-heading {
      font-size: 1.2em;
      margin-bottom: 10px;
    }

    .review-text {
      font-size: 1em;
      margin-bottom: 10px;
    }

    .review-person {
      font-size: 0.9em;
      color: #555;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      .reviews-grid {
        grid-template-columns: 1fr;
      }
      body {
        background-color: aqua;
      }
      .review-card {
        background-color: white;
      }
    }
  </style>
  <body>
    <div class="reviews-grid">
      <div class="review-card">
        <h3 class="review-heading">Review 1</h3>
        <p class="review-text">
          "Amazing product! Highly recommend it to everyone!"
        </p>
        <p class="review-person">Alex</p>
      </div>
      <div class="review-card">
        <h3 class="review-heading">Review 2</h3>
        <p class="review-text">
          "Great value for the price. Delivered quickly."
        </p>
        <p class="review-person">Jamie</p>
      </div>
      <div class="review-card">
        <h3 class="review-heading">Review 3</h3>
        <p class="review-text">"Works as advertised. Would buy again."</p>
        <p class="review-person">Taylor</p>
      </div>
      <div class="review-card">
        <h3 class="review-heading">Review 4</h3>
        <p class="review-text">"Not what I expected, but decent quality."</p>
        <p class="review-person">Morgan</p>
      </div>
    </div>
  </body>
</html>
