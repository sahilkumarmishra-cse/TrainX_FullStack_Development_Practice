<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small Product Card</title>
</head>

<body style="margin: 0;
             padding: 20px;
             background: white;
             font-family: Arial, Helvetica, sans-serif;">

    <!-- Product Card -->
    <div style="width: 300px;
                background: #f6f2e8;
                border-radius: 25px;
                overflow: hidden;

                box-shadow: 0px 5px 15px rgba(0,0,0,0.2);">

        <!-- Image Section -->
        <div style="position: relative;">

            <!-- <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=700"
                 alt="Product Image"

                 style="width: 100%;
                        height: 220px;
                        object-fit: cover;"> -->

            <img src="https://media.istockphoto.com/id/1381637603/photo/mountain-landscape.jpg?s=2048x2048&w=is&k=20&c=KIQfpt1GjnhLhDPF0-hj8vfjKRFlA8YGMx5XZk09Fjo="
                 alt="Product Image"

                 style="width: 100%;
                        height: 220px;
                        object-fit: cover;">

            <!-- Heart Icon -->
            <div style="position: absolute;
                        top: 15px;
                        left: 15px;

                        width: 45px;
                        height: 45px;

                        background: white;
                        border-radius: 50%;

                        display: flex;
                        justify-content: center;
                        align-items: center;

                        color: crimson;
                        font-size: 22px;

                        box-shadow: 0px 3px 10px rgba(0,0,0,0.2);">

                ❤
            </div>

        </div>

        <!-- Content -->
        <div style="padding: 20px;">

            <!-- Product Name -->
            <h2 style="margin-top: 0;
                       margin-bottom: 18px;

                       color: #c4a06b;
                       font-size: 24px;
                       letter-spacing: 1px;">

                PRODUCT NAME
            </h2>

            <!-- Price -->
            <button style="border: none;
                           background: #2c2622;
                           color: white;

                           padding: 10px 22px;
                           border-radius: 30px;

                           font-size: 16px;
                           cursor: pointer;

                           margin-bottom: 18px;">

                $41.00 USD
            </button>

            <!-- Description -->
            <p style="font-size: 14px;
                      color: #333;
                      line-height: 1.6;
                      margin: 0;">

                Lorem ipsum dolor sit amet consectetur adipisicing elit.
                Repellat nemo dolore reiciendis officiis.
            </p>

        </div>

    </div>

</body>

</html>
