<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Neumorphism Profile Card</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body style="margin: 0;
             padding: 0;
             display: flex;
             justify-content: center;
             align-items: center;
             height: 100vh;
             background: #e6e6e6;
             font-family: Arial, Helvetica, sans-serif;">

    <!-- Main Card -->
    <div style="width: 350px;
                background: #e6e6e6;
                border-radius: 20px;
                padding: 30px;
                text-align: center;
                box-shadow: 10px 10px 20px #bebebe,
                            -10px -10px 20px #ffffff;">

        <!-- Top Icons -->
        <div style="display: flex;
                    justify-content: space-between;
                    align-items: center;">

            <i class="fa-solid fa-arrow-left"
               style="font-size: 22px;
                      color: gray;"></i>

            <i class="fa-solid fa-ellipsis-vertical"
               style="font-size: 22px;
                      color: gray;"></i>
        </div>

        <!-- Profile Image -->
        <div style="margin-top: 25px;">

            <!--<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400"
                 alt="Profile Image"-->

            <img src="https://plus.unsplash.com/premium_photo-1661877737564-3dfd7282efcb?q=80&w=1200&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"

                 style="width: 140px;
                        height: 140px;
                        border-radius: 50%;
                        object-fit: cover;
                        padding: 8px;
                        background: #e6e6e6;

                        box-shadow: 8px 8px 15px #bebebe,
                                   -8px -8px 15px #ffffff;">
        </div>

        <!-- Name -->
        <h1 style="margin-top: 25px;
                   margin-bottom: 5px;
                   font-size: 42px;
                   color: #333;">
            CodingInnova
        </h1>

        <!-- Profession -->
        <p style="font-size: 24px;
                  color: gray;
                  margin-top: 0;">
            Designer & Developer
        </p>

        <!-- Social Icons -->
        <div style="display: flex;
                    justify-content: center;
                    gap: 25px;
                    margin-top: 25px;">

            <!-- Facebook -->
            <div style="width: 55px;
                        height: 55px;
                        border-radius: 50%;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        background: #e6e6e6;

                        box-shadow: 6px 6px 12px #bebebe,
                                   -6px -6px 12px #ffffff;">

                <i class="fa-brands fa-facebook-f"
                   style="color: #1877f2;
                          font-size: 24px;"></i>
            </div>

            <!-- Twitter -->
            <div style="width: 55px;
                        height: 55px;
                        border-radius: 50%;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        background: #e6e6e6;

                        box-shadow: 6px 6px 12px #bebebe,
                                   -6px -6px 12px #ffffff;">

                <i class="fa-brands fa-twitter"
                   style="color: #1da1f2;
                          font-size: 24px;"></i>
            </div>

            <!-- Instagram -->
            <div style="width: 55px;
                        height: 55px;
                        border-radius: 50%;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        background: #e6e6e6;

                        box-shadow: 6px 6px 12px #bebebe,
                                   -6px -6px 12px #ffffff;">

                <i class="fa-brands fa-instagram"
                   style="color: #e1306c;
                          font-size: 24px;"></i>
            </div>

            <!-- YouTube -->
            <div style="width: 55px;
                        height: 55px;
                        border-radius: 50%;
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        background: #e6e6e6;

                        box-shadow: 6px 6px 12px #bebebe,
                                   -6px -6px 12px #ffffff;">

                <i class="fa-brands fa-youtube"
                   style="color: red;
                          font-size: 24px;"></i>
            </div>

        </div>

        <!-- Buttons -->
        <div style="display: flex;
                    justify-content: center;
                    gap: 20px;
                    margin-top: 35px;">

            <button style="width: 140px;
                           padding: 15px;
                           border: none;
                           border-radius: 12px;
                           font-size: 20px;
                           background: #e6e6e6;
                           cursor: pointer;

                           box-shadow: 6px 6px 12px #bebebe,
                                      -6px -6px 12px #ffffff;">

                Message
            </button>

            <button style="width: 140px;
                           padding: 15px;
                           border: none;
                           border-radius: 12px;
                           font-size: 20px;
                           background: #e6e6e6;
                           cursor: pointer;

                           box-shadow: 6px 6px 12px #bebebe,
                                      -6px -6px 12px #ffffff;">

                Subscribe
            </button>

        </div>

        <!-- Bottom Stats -->
        <div style="display: flex;
                    justify-content: space-around;
                    margin-top: 40px;
                    font-size: 24px;
                    color: #444;">

            <div>
                <i class="fa-regular fa-heart"></i>
                20.4k
            </div>

            <div>
                <i class="fa-regular fa-comment"></i>
                14.3k
            </div>

            <div>
                <i class="fa-solid fa-share"></i>
                12.8k
            </div>

        </div>

    </div>

</body>

</html>
