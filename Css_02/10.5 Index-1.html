<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flipkart Layout</title>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS File Link -->
    <link rel="stylesheet" href="10.6 Style-1.3.css">
    <!--Note That Writting Only Style-1.3.css Will Not Work You Need To Specify The Exact Path As 10.6 Style-1.3.css-->

</head>

<body>

    <!-- Main Container -->
    <div class="main-container">

        <!-- TOP NAVBAR -->
        <div class="top-navbar">

            <!-- Left Navigation -->
            <div class="left-nav">

                <div class="nav-btn active-btn">
                    <i class="fa-solid fa-square-check"></i>
                    <span>Flipkart</span>
                </div>

                <div class="nav-btn">
                    <i class="fa-solid fa-plane"></i>
                    <span>Travel</span>
                </div>

            </div>

            <!-- Right Location -->
            <div class="location-box">
                <i class="fa-solid fa-location-dot"></i>
                <span>Location : Vadodara</span>
            </div>

        </div>

        <!-- OFFER SECTION -->
        <div class="offer-container">

            <div class="offer-left"></div>

            <div class="offer-right"></div>

        </div>

        <!-- CATEGORY BOXES -->
        <div class="category-container">

            <div class="category-box">Box 1</div>
            <div class="category-box">Box 2</div>
            <div class="category-box">Box 3</div>
            <div class="category-box">Box 4</div>
            <div class="category-box">Box 5</div>
            <div class="category-box">Box 6</div>
            <div class="category-box">Box 7</div>
            <div class="category-box">Box 8</div>
            <div class="category-box">Box 9</div>
            <div class="category-box">Box 10</div>
            <div class="category-box">Box 11</div>
            <div class="category-box">Box 12</div>
            <div class="category-box">Box 13</div>
            <div class="category-box">Box 14</div>

        </div>

        <!-- ADVERTISEMENT SECTION -->

        <div class="ad-container">

            <div class="ad-box ad-box-1">
                Ad Banner 1
            </div>

            <div class="ad-box ad-box-2">
                Ad Banner 2
            </div>

            <div class="ad-box ad-box-3">
                Ad Banner 3
            </div>

        </div>

    </div>

</body>

</html>
