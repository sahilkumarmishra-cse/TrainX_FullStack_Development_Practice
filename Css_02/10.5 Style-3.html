<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flipkart Header</title>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body style="margin:0;
             font-family:Arial, Helvetica, sans-serif;
             background:white;">

    <!-- Main Navbar -->
    <div style="width:100%;
                display:flex;
                justify-content:space-between;
                align-items:center;
                padding:20px 40px;
                box-sizing:border-box;">

        <!-- Left Side -->
        <div style="display:flex;
                    gap:20px;
                    align-items:center;">

            <!-- Flipkart Button -->
            <div style="background:#ffe500;
                        padding:12px 35px;
                        border-radius:12px;
                        display:flex;
                        align-items:center;
                        gap:10px;
                        font-size:22px;
                        cursor:pointer;">

                <i class="fa-solid fa-bag-shopping"
                   style="color:#0b8f4d;"></i>

                <span>Flipkart</span>
            </div>

            <!-- Travel Button -->
            <div style="background:#f2f2f2;
                        padding:12px 35px;
                        border-radius:12px;
                        display:flex;
                        align-items:center;
                        gap:10px;
                        font-size:22px;
                        cursor:pointer;">

                <i class="fa-solid fa-plane"
                   style="color:#6b7280;"></i>

                <span>Travel</span>
            </div>

        </div>

        <!-- Right Side -->
        <div style="display:flex;
                    align-items:center;
                    gap:12px;
                    font-size:22px;
                    color:#333;">

            <i class="fa-solid fa-location-dot"></i>

            <span>Location : Vadodara</span>

        </div>

    </div>

</body>

</html>
